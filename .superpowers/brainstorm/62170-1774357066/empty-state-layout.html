<h2>Empty State 레이아웃</h2>
<p class="subtitle">어떤 구성이 마음에 드시나요?</p>

<div class="cards">
  <div class="card" data-choice="centered" onclick="toggleSelect(this)">
    <div class="card-image">
      <div class="mockup" style="background: var(--bg1); height: 200px; display: flex; align-items: center; justify-content: center;">
        <div style="text-align: center;">
          <div style="width: 64px; height: 64px; background: var(--accent); border-radius: 16px; margin: 0 auto 16px;"></div>
          <div style="font-weight: 600; color: var(--text); margin-bottom: 8px;">SceneX</div>
          <div style="font-size: 12px; color: var(--text3); margin-bottom: 20px;">스토리보드 에디터</div>
          <div class="mock-button" style="display: inline-block;">시작하기</div>
        </div>
      </div>
    </div>
    <div class="card-body">
      <h3>A. Centered</h3>
      <p>로고 + 타이틀 + 버튼이 화면 중앙에 위치한 클래식한 구성</p>
    </div>
  </div>

  <div class="card" data-choice="split" onclick="toggleSelect(this)">
    <div class="card-image">
      <div class="mockup" style="background: var(--bg1); height: 200px; display: flex;">
        <div style="flex: 1; display: flex; align-items: center; justify-content: center; border-right: 1px solid var(--border);">
          <div style="text-align: center; padding: 20px;">
            <div style="width: 48px; height: 48px; background: var(--accent); border-radius: 12px; margin: 0 auto 12px;"></div>
            <div style="font-weight: 600; color: var(--text); font-size: 14px;">SceneX</div>
          </div>
        </div>
        <div style="flex: 1.5; display: flex; align-items: center; justify-content: center;">
          <div style="text-align: center; padding: 20px;">
            <div style="font-size: 13px; color: var(--text2); margin-bottom: 16px;">새 프로젝트를 시작해보세요</div>
            <div class="mock-button" style="display: inline-block;">새 프로젝트 만들기</div>
          </div>
        </div>
      </div>
    </div>
    <div class="card-body">
      <h3>B. Split</h3>
      <p>왼쪽에 브랜딩, 오른쪽에 액션 영역이 분리된 구성</p>
    </div>
  </div>

  <div class="card" data-choice="editor" onclick="toggleSelect(this)">
    <div class="card-image">
      <div class="mockup" style="background: var(--bg1); height: 200px; display: flex; flex-direction: column;">
        <div class="mock-nav" style="padding: 8px 12px; border-bottom: 1px solid var(--border); font-size: 11px;">SceneX</div>
        <div style="flex: 1; display: flex; align-items: center; justify-content: center;">
          <div style="text-align: center;">
            <div style="font-size: 13px; color: var(--text2); margin-bottom: 12px;">프로젝트가 없습니다</div>
            <div class="mock-button" style="display: inline-block; font-size: 12px;">+ 새 프로젝트</div>
            <div style="margin-top: 12px; font-size: 11px; color: var(--text3);">또는 <span style="color: var(--accent); cursor: pointer;">기존 프로젝트 열기</span></div>
          </div>
        </div>
      </div>
    </div>
    <div class="card-body">
      <h3>C. Editor Preview</h3>
      <p>실제 에디터 레이아웃을 미리 보여주며 빈 상태 표시</p>
    </div>
  </div>
</div>
