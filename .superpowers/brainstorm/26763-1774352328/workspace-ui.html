<h2>워크스페이스 UI 구조</h2>
<p class="subtitle">프로젝트 목록을 어떻게 표시할까요?</p>

<div class="options">
  <div class="option" data-choice="sidebar" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>사이드바 확장</h3>
      <p>현재 왼쪽 사이드바에 워크스페이스/프로젝트 선택 영역 추가</p>
    </div>
  </div>
  <div class="option" data-choice="modal" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>시작 화면 (모달)</h3>
      <p>앱 시작 시 프로젝트 선택 화면 표시, 프로젝트 열린 후에는 타이틀바에서 전환</p>
    </div>
  </div>
  <div class="option" data-choice="dedicated" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>전용 패널</h3>
      <p>상단 툴바에 "프로젝트 관리" 버튼, 클릭 시 전체 화면 프로젝트 브라우저</p>
    </div>
  </div>
</div>
